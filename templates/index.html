<!DOCTYPE html>
<html>
<head>
    <title>Review Rating Predictor</title>
</head>
<body>
    <h2>⭐ Automated Review Rating Predictor</h2>

    <form method="POST">
        <textarea name="review" rows="5" cols="60"
        placeholder="Enter your review here"></textarea><br><br>

        <button type="submit">Predict Rating</button>
    </form>

    {% if prediction %}
        <h3>Predicted Rating: ⭐ {{ prediction }}</h3>
        <p>Confidence: {{ confidence | round(2) }}</p>
    {% endif %}

</body>
</html>
